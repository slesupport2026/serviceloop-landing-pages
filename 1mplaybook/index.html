  <body>
    <div id="root"></div>
    <script>
    (function(){
      var a=0;
      var iv=setInterval(function(){
        a++;
        if(a>100){clearInterval(iv);return;}
        if(document.getElementById('sle-q-years'))return;
        var forms=document.querySelectorAll('form');
        var form=null;
        for(var i=0;i<forms.length;i++){
          if(forms[i].querySelector('input[type="tel"]')){form=forms[i];break;}
        }
        if(!form)return;
        var submitBtn=form.querySelector('button[type="submit"]');
        if(!submitBtn)return;
        clearInterval(iv);

        var ss='width:100%;padding:0.75rem 1rem;border-radius:4px;border:1px solid rgba(227,197,117,0.3);background:rgba(27,42,69,0.8);color:#fff;font-family:Open Sans,sans-serif;font-size:0.95rem;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;transition:border-color 0.2s;';
        var ls='display:block;font-family:Montserrat,sans-serif;font-weight:600;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;color:#FDC33E;margin-bottom:0.4rem;';
        var ws='margin-top:1rem;';

        var questions=[
          {id:'sle-q-years',label:'How long have you been in business? *',opts:['','Less than 1 year','1 to 3 years','3 to 5 years','5+ years']},
          {id:'sle-q-techs',label:'Number of Service Techs (Incl Owner) *',opts:['','1','2-4','5-9','10+']},
          {id:'sle-q-revenue',label:'Monthly Revenue (Approximate) *',opts:['','Under $30k/mo','$31-80k/mo','$80-100k/mo','$100K+/mo']}
        ];

        var container=document.createElement('div');
        container.style.cssText='margin-top:0.5rem;';
        questions.forEach(function(q){
          var d=document.createElement('div');
          d.style.cssText=ws;
          var l=document.createElement('label');
          l.style.cssText=ls;
          l.textContent=q.label;
          l.setAttribute('for',q.id);
          var s=document.createElement('select');
          s.id=q.id;s.name=q.id;s.required=true;
          s.style.cssText=ss;
          s.addEventListener('focus',function(){this.style.borderColor='#fdc33e';this.style.boxShadow='0 0 0 2px rgba(253,195,62,0.15)';});
          s.addEventListener('blur',function(){this.style.borderColor='rgba(227,197,117,0.3)';this.style.boxShadow='none';});
          q.opts.forEach(function(o){
            var opt=document.createElement('option');
            opt.value=o;opt.textContent=o||'Select...';
            if(!o){opt.disabled=true;opt.selected=true;}
            opt.style.background='#1b2a45';
            s.appendChild(opt);
          });
          d.appendChild(l);d.appendChild(s);container.appendChild(d);
        });

        // Move Daily Sparks checkbox below dropdowns, above submit
        var checkbox=form.querySelector('input[type="checkbox"]');
        if(checkbox){
          var cbRow=checkbox.parentElement;
          container.appendChild(cbRow);
        }
        submitBtn.parentElement.insertBefore(container,submitBtn);
      },200);
    })();
    </script>
    <script>
    (function(){
      var a=0;
      var iv=setInterval(function(){
        a++;
        if(a>200){clearInterval(iv);return;}
        if(document.getElementById('sle-calc'))return;
        // Find the h3 heading "Simpler Than You Think" inside the .sle-card
        var headings=document.querySelectorAll('h3');
        var heading=null;
        for(var i=0;i<headings.length;i++){
          if((headings[i].textContent||'').indexOf('Simpler Than You Think')>-1){
            heading=headings[i];break;
          }
        }
        if(!heading)return;
        // The .sle-card is the heading's parent
        var target=heading.parentElement;
        if(!target)return;
        clearInterval(iv);

        // Hide only the static children inside this card
        Array.from(target.children).forEach(function(ch){ch.style.display='none';});

        var calc=document.createElement('div');
        calc.id='sle-calc';
        calc.style.cssText='padding:2rem;';

        // Heading
        var h=document.createElement('div');
        h.style.cssText="font-family:'Playfair Display',serif;font-style:italic;font-size:1.6rem;color:#E3C575;font-weight:700;margin-bottom:1.5rem;text-align:center;";
        h.textContent="The $1M Math. It\u2019s Simpler Than You Think";
        calc.appendChild(h);

        // Subtitle
        var sub=document.createElement('div');
        sub.style.cssText="text-align:center;font-family:'Open Sans',sans-serif;font-size:0.85rem;color:rgba(255,255,255,0.55);margin-bottom:2rem;";
        sub.textContent="Adjust the sliders below. The average ticket auto-calculates to hit $83,334/month.";
        calc.appendChild(sub);

        // Slider config
        var sliders=[
          {id:'sc-calls',label:'Calls Per Day',min:1,max:10,step:1,val:3,fmt:function(v){return v;}},
          {id:'sc-days',label:'Working Days / Month',min:10,max:26,step:1,val:20,fmt:function(v){return v;}},
          {id:'sc-conv',label:'Conversion Rate',min:20,max:95,step:5,val:60,fmt:function(v){return v+'%';}}
        ];

        var sliderEls={};
        var grid=document.createElement('div');
        grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.25rem;margin-bottom:1.5rem;';

        sliders.forEach(function(s){
          var card=document.createElement('div');
          card.style.cssText='text-align:center;padding:1.25rem 1rem;background:rgba(10,10,10,0.5);border-radius:6px;border:1px solid rgba(227,197,117,0.15);';

          var valDisplay=document.createElement('div');
          valDisplay.id=s.id+'-val';
          valDisplay.style.cssText="font-family:'Playfair Display',serif;font-style:italic;font-size:1.75rem;color:#FDC33E;font-weight:700;";
          valDisplay.textContent=s.fmt(s.val);

          var lbl=document.createElement('div');
          lbl.style.cssText="font-family:'Montserrat',sans-serif;font-weight:600;font-size:0.72rem;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.25rem;margin-bottom:0.75rem;";
          lbl.textContent=s.label;

          var slider=document.createElement('input');
          slider.type='range';slider.min=s.min;slider.max=s.max;slider.step=s.step;slider.value=s.val;
          slider.id=s.id;
          slider.style.cssText='width:100%;accent-color:#FDC33E;cursor:pointer;height:6px;';
          sliderEls[s.id]=slider;

          slider.addEventListener('input',recalc);
          card.appendChild(valDisplay);card.appendChild(lbl);card.appendChild(slider);
          grid.appendChild(card);
        });
        calc.appendChild(grid);

        // Results row
        var results=document.createElement('div');
        results.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;';

        var resultCards=[
          {id:'sc-leads',label:'Leads / Month'},
          {id:'sc-closed',label:'Closed Jobs'},
          {id:'sc-ticket',label:'Avg Ticket Needed'},
          {id:'sc-annual',label:'Annual Revenue'}
        ];

        resultCards.forEach(function(r){
          var card=document.createElement('div');
          card.style.cssText='text-align:center;padding:1rem;background:rgba(10,10,10,0.5);border-radius:6px;border:1px solid rgba(227,197,117,0.15);';

          var v=document.createElement('div');
          v.id=r.id;
          v.style.cssText="font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;color:#FDC33E;font-weight:700;";

          var l=document.createElement('div');
          l.style.cssText="font-family:'Montserrat',sans-serif;font-weight:600;font-size:0.72rem;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.25rem;";
          l.textContent=r.label;

          card.appendChild(v);card.appendChild(l);results.appendChild(card);
        });
        calc.appendChild(results);

        // Formula bar
        var formula=document.createElement('div');
        formula.id='sc-formula';
        formula.style.cssText="text-align:center;padding:1.25rem;background:rgba(10,10,10,0.35);border-radius:8px;border:1px solid rgba(227,197,117,0.1);";
        calc.appendChild(formula);

        target.appendChild(calc);
        recalc();

        function recalc(){
          var calls=parseInt(sliderEls['sc-calls'].value);
          var days=parseInt(sliderEls['sc-days'].value);
          var conv=parseInt(sliderEls['sc-conv'].value)/100;
          var TARGET=83334;

          var leads=calls*days;
          var closed=Math.round(leads*conv);
          var ticket=closed>0?Math.round(TARGET/closed):0;
          var annual=TARGET*12;

          document.getElementById('sc-calls-val').textContent=calls;
          document.getElementById('sc-days-val').textContent=days;
          document.getElementById('sc-conv-val').textContent=Math.round(conv*100)+'%';

          document.getElementById('sc-leads').textContent=leads;
          document.getElementById('sc-closed').textContent=closed;
          document.getElementById('sc-ticket').textContent='$'+ticket.toLocaleString();
          document.getElementById('sc-annual').textContent='$'+annual.toLocaleString();

          var f=document.getElementById('sc-formula');
          f.innerHTML='<div style="font-family:\'Open Sans\',sans-serif;font-size:0.95rem;color:rgba(255,255,255,0.75);">'
            +calls+' calls \u00d7 '+days+' days \u00d7 '+Math.round(conv*100)+'% \u00d7 <span style="color:#FDC33E;font-weight:700;">$'+ticket.toLocaleString()+'</span> = '
            +'<span style="font-family:\'Playfair Display\',serif;font-style:italic;font-size:1.4rem;color:#FDC33E;font-weight:700;">$'+TARGET.toLocaleString()+'/month</span></div>'
            +'<div style="font-family:\'Open Sans\',sans-serif;font-size:0.82rem;color:rgba(255,255,255,0.45);margin-top:0.35rem;">That\u2019s $'+annual.toLocaleString()+' in annual sales. The line of safety.</div>';
        }
      },200);
    })();
    </script>
