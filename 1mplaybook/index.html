  <body>
    <div id="root"></div>
    <script>
    (function(){
      var a=0;
      var iv=setInterval(function(){
        a++;
        if(a>100){clearInterval(iv);return;}
        if(document.getElementById('sle-q-years'))return;
        var forms=document.querySelectorAll('form');
        var form=null;
        for(var i=0;i<forms.length;i++){
          if(forms[i].querySelector('input[type="tel"]')){form=forms[i];break;}
        }
        if(!form)return;
        var submitBtn=form.querySelector('button[type="submit"]');
        if(!submitBtn)return;
        clearInterval(iv);

        var ss='width:100%;padding:0.75rem 1rem;border-radius:4px;border:1px solid rgba(227,197,117,0.3);background:rgba(27,42,69,0.8);color:#fff;font-family:Open Sans,sans-serif;font-size:0.95rem;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;transition:border-color 0.2s;';
        var ls='display:block;font-family:Montserrat,sans-serif;font-weight:600;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;color:#FDC33E;margin-bottom:0.4rem;';
        var ws='margin-top:1rem;';

        var questions=[
          {id:'sle-q-years',label:'How long have you been in business? *',opts:['','Less than 1 year','1 to 3 years','3 to 5 years','5+ years']},
          {id:'sle-q-techs',label:'Number of Service Techs (Incl Owner) *',opts:['','1','2-4','5-9','10+']},
          {id:'sle-q-revenue',label:'Monthly Revenue (Approximate) *',opts:['','Under $30k/mo','$31-80k/mo','$80-100k/mo','$100K+/mo']}
        ];

        var container=document.createElement('div');
        container.style.cssText='margin-top:0.5rem;';
        questions.forEach(function(q){
          var d=document.createElement('div');
          d.style.cssText=ws;
          var l=document.createElement('label');
          l.style.cssText=ls;
          l.textContent=q.label;
          l.setAttribute('for',q.id);
          var s=document.createElement('select');
          s.id=q.id;s.name=q.id;s.required=true;
          s.style.cssText=ss;
          s.addEventListener('focus',function(){this.style.borderColor='#fdc33e';this.style.boxShadow='0 0 0 2px rgba(253,195,62,0.15)';});
          s.addEventListener('blur',function(){this.style.borderColor='rgba(227,197,117,0.3)';this.style.boxShadow='none';});
          q.opts.forEach(function(o){
            var opt=document.createElement('option');
            opt.value=o;opt.textContent=o||'Select...';
            if(!o){opt.disabled=true;opt.selected=true;}
            opt.style.background='#1b2a45';
            s.appendChild(opt);
          });
          d.appendChild(l);d.appendChild(s);container.appendChild(d);
        });

        // Move Daily Sparks checkbox below dropdowns, above submit
        var checkbox=form.querySelector('input[type="checkbox"]');
        if(checkbox){
          var cbRow=checkbox.parentElement;
          container.appendChild(cbRow);
        }
        submitBtn.parentElement.insertBefore(container,submitBtn);
      },200);
    })();
    </script>
    <script>
    (function(){
      var a=0;
      var iv=setInterval(function(){
        a++;
        if(a>200){clearInterval(iv);return;}
        var footer=document.querySelector('footer');
        if(!footer)return;
        if(document.getElementById('sle-disclaimer'))return;
        clearInterval(iv);
        var d=document.createElement('div');
        d.id='sle-disclaimer';
        d.style.cssText='max-width:900px;margin:2.5rem auto 0;padding:2rem 1.5rem 0;border-top:1px solid rgba(255,255,255,0.08);font-family:Open Sans,sans-serif;font-size:0.72rem;line-height:1.7;color:rgba(255,255,255,0.35);text-align:center;';
        d.innerHTML='<p style="margin:0 0 0.75rem">Results are not guaranteed and will vary based on individual effort, market conditions, business experience, and execution. The testimonials, statistics, and case studies presented on this page represent the experiences and results of individual users and do not constitute typical or average results. The Simple Service Rate (SSR) Tool is an educational resource designed to help you calculate your service rate based on your specific business inputs.</p>'
          +'<p style="margin:0 0 0.75rem">Past performance and results of others do not guarantee future results. Individual results may vary significantly. Service Loop Electrical Inc makes no representation or warranty regarding future earnings, income, or business results. This page is for educational purposes only and should not be considered financial, business, or legal advice. Consult with a qualified professional before making business decisions.</p>'
          +'<p style="margin:0">The statistics and metrics displayed (1,000+ electricians, $21.6M+ wins, $304K single month record, $1.1M first year business record, 350+ active SLE Pros, $91K largest single sale) represent reported results from individual users in our community and are not typical or average results. These represent outlier achievements and should not be considered as representative of what you can expect.</p>';
        footer.appendChild(d);
      },300);
    })();
    </script>
