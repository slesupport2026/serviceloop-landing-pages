<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLE Funnel Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0A;--surface:#111;--card:#151515;--card-hover:#1a1a1a;--border:rgba(255,255,255,0.06);
  --gold:#C9A45A;--bright:#E8C97A;--accent:#FDC33E;
  --white:#fff;--gray:#777;--light:#aaa;
  --red:#CE302A;--green:#2d7a2d;--teal:#1a7a6e;--blue:#4466cc;--purple:#8855cc;
  --radius:14px;
}
body{background:var(--bg);color:var(--white);font-family:"Open Sans",sans-serif;display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);}
.sidebar-logo{font-family:Montserrat;font-weight:900;font-size:1rem;color:var(--gold);}
.sidebar-sub{font-size:0.6rem;color:var(--gray);margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-family:Montserrat;font-weight:600;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}
.nav-section{padding:14px 16px 4px;font-family:Montserrat;font-size:0.55rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:0.75rem;color:var(--light);transition:all 0.12s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.03);color:var(--white);}
.nav-item.active{background:rgba(201,164,90,0.06);color:var(--accent);border-left-color:var(--accent);}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-empty{border:2px solid #444;background:transparent;}
.dot-draft{border:2px solid var(--accent);background:rgba(253,195,62,0.3);}
.dot-done{border:2px solid var(--green);background:var(--green);}
.dot-flag{border:2px solid var(--red);background:var(--red);}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:0.65rem;color:#555;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.topbar-crumb{font-family:Montserrat;font-size:0.72rem;color:var(--gray);}
.topbar-crumb b{color:var(--white);}
.topbar-btns{display:flex;gap:6px;}
.btn{font-family:Montserrat;font-size:0.68rem;font-weight:700;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--bright));color:#000;}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(201,164,90,0.3);}
.content-area{flex:1;overflow-y:auto;padding:0;}

/* FLOW VIEW */
.flow{max-width:960px;margin:0 auto;padding:32px 24px 80px;}
.flow-title{font-family:Montserrat;font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:4px;}
.flow-sub{text-align:center;font-size:0.82rem;color:var(--gray);margin-bottom:32px;line-height:1.5;}

.funnel-section{margin-bottom:4px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:border-color 0.2s;}
.funnel-section:hover{border-color:rgba(201,164,90,0.15);}
.funnel-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;background:var(--card);transition:background 0.15s;user-select:none;}
.funnel-header:hover{background:var(--card-hover);}
.funnel-badge{font-family:Montserrat;font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:6px;flex-shrink:0;}
.badge-tofu{background:rgba(206,48,42,0.12);color:#ff8888;border:1px solid rgba(206,48,42,0.25);}
.badge-mofu{background:rgba(253,195,62,0.1);color:var(--accent);border:1px solid rgba(253,195,62,0.2);}
.badge-bofu{background:rgba(26,122,110,0.1);color:#88ffee;border:1px solid rgba(26,122,110,0.25);}
.funnel-info{flex:1;}
.funnel-name{font-family:Montserrat;font-size:0.88rem;font-weight:800;color:var(--white);}
.funnel-sells{font-size:0.72rem;color:var(--gray);margin-top:2px;}
.funnel-sells b{color:var(--accent);}
.funnel-chev{color:var(--gray);font-size:0.9rem;transition:transform 0.2s;flex-shrink:0;}
.funnel-section.open .funnel-chev{transform:rotate(180deg);}
.funnel-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease;background:rgba(0,0,0,0.25);}
.funnel-section.open .funnel-body{max-height:5000px;}
.funnel-inner{padding:20px 24px;}

/* SECTION CONTENT */
.sec-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:800px){.sec-grid{grid-template-columns:1fr;}.sidebar{width:220px;}}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color 0.15s;}
.sec-card:hover{border-color:rgba(201,164,90,0.15);}
.sec-card.full{grid-column:1/-1;}
.sec-label{font-family:Montserrat;font-size:0.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.label-green{color:#6bff6b;}.label-red{color:#ff6b6b;}.label-gold{color:var(--accent);}.label-blue{color:#6b9fff;}.label-teal{color:#6bffee;}.label-purple{color:#bb88ff;}
.sec-body{font-size:0.78rem;color:var(--light);line-height:1.55;}
.sec-body b{color:var(--white);}
.sec-body ul{margin:6px 0 0 14px;}
.sec-body li{margin-bottom:3px;}

/* RULE CHECKS */
.rule{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:0.75rem;color:var(--light);}
.rbox{width:14px;height:14px;border-radius:3px;border:1px solid #444;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.55rem;transition:all 0.1s;}
.rbox.on{border-color:var(--green);background:rgba(45,122,45,0.25);color:var(--green);}

/* DOC UPLOAD */
.upload{border:2px dashed rgba(201,164,90,0.15);border-radius:10px;padding:16px;text-align:center;cursor:pointer;font-size:0.75rem;color:var(--gray);transition:border-color 0.15s;}
.upload:hover{border-color:var(--gold);}
.doc{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.02);border-radius:8px;margin-top:6px;font-size:0.75rem;}
.doc-name{flex:1;color:var(--white);font-weight:600;}
.doc-st{font-family:Montserrat;font-size:0.55rem;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:1px;text-transform:uppercase;}
.st-pending{background:rgba(253,195,62,0.12);color:var(--accent);}
.st-ok{background:rgba(45,122,45,0.12);color:#88ff88;}
.st-flag{background:rgba(206,48,42,0.12);color:#ff8888;}
.doc-btn{font-size:0.6rem;padding:3px 7px;border-radius:5px;border:none;cursor:pointer;font-family:Montserrat;font-weight:700;}
.db-ok{background:rgba(45,122,45,0.15);color:#88ff88;}.db-no{background:rgba(206,48,42,0.15);color:#ff8888;}.db-mv{background:rgba(68,102,204,0.15);color:#88bbff;}

/* FLOW ARROW */
.flow-arrow{text-align:center;padding:6px 0;color:var(--gold);font-size:1.1rem;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
</style>
</head>

// Build sidebar
function buildSidebar(){
  let html='';
  let lastStage='';
  S.forEach((s,i)=>{
    if(s.stage!==lastStage){
      const colors={TOFU:'#ff6b6b',MOFU:'var(--accent)',BOFU:'#6bffee'};
      html+=`<div class="nav-section" style="color:${colors[s.stage]}">${s.stage}</div>`;
      lastStage=s.stage;
    }
    const docs=JSON.parse(localStorage.getItem('docs-'+s.id)||'[]');
    const dotCls=docs.length===0?'dot-empty':docs.some(d=>d.st==='flag')?'dot-flag':docs.every(d=>d.st==='ok')?'dot-done':'dot-draft';
    html+=`<div class="nav-item${i===0?' active':''}" id="nav-${s.id}" onclick="scrollToSection('${s.id}')">`+
      `<div class="nav-dot ${dotCls}"></div>${s.name}</div>`;
  });
  document.getElementById('sideNav').innerHTML=html;
}

// Build flow view
function buildFlow(){
  let html=`<div class="flow">
    <div class="flow-title">SLE 2026 Funnel Architecture</div>
    <div class="flow-sub">Coach them every day until they're ready. Be there the moment they are.<br>Click any section to expand. Attach docs. Review compliance. Track progress.</div>`;

  S.forEach((s,i)=>{
    if(i>0) html+=`<div class="flow-arrow">&darr;</div>`;
    html+=buildSection(s,i===0);
  });

  html+=`</div>`;
  document.getElementById('contentArea').innerHTML=html;
}

function buildSection(s,startOpen){
  const docs=JSON.parse(localStorage.getItem('docs-'+s.id)||'[]');
  let h=`<div class="funnel-section${startOpen?' open':''}" id="sec-${s.id}">
    <div class="funnel-header" onclick="toggleSec('sec-${s.id}')">
      <span class="funnel-badge ${s.badge}">${s.stage}</span>
      <div class="funnel-info">
        <div class="funnel-name">${s.name}</div>
        <div class="funnel-sells">${s.sells}</div>
      </div>
      <span class="funnel-chev">&#9660;</span>
    </div>
    <div class="funnel-body"><div class="funnel-inner">
      <div class="sec-grid">`;

  // What it does
  h+=`<div class="sec-card"><div class="sec-label label-green">What It Does</div>
    <div class="sec-body">${s.desc}</div></div>`;

  // What it does NOT do
  h+=`<div class="sec-card"><div class="sec-label label-red">What It Does NOT Do</div>
    <div class="sec-body"><ul>${(s.doesNot||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`;

  // What it sells next
  h+=`<div class="sec-card"><div class="sec-label label-gold">Sells Next Step</div>
    <div class="sec-body">${s.sells}</div></div>`;

  // Rules
  h+=`<div class="sec-card full"><div class="sec-label label-blue">Rules and Requirements</div>`;
  (s.rules||[]).forEach((r,ri)=>{
    const ck=localStorage.getItem(s.id+'-r-'+ri)==='1';
    h+=`<div class="rule"><div class="rbox${ck?' on':''}" onclick="togRule('${s.id}',${ri},this)">${ck?'&#10003;':''}</div><span>${r}</span></div>`;
  });
  h+=`</div>`;

  // Documents
  h+=`<div class="sec-card full"><div class="sec-label label-purple">Attached Documents</div>
    <div class="upload" onclick="addDoc('${s.id}')">Click to <b>attach a document</b> to this section</div>`;
  docs.forEach((d,di)=>{
    h+=`<div class="doc"><span style="color:var(--accent)">&#128196;</span>
      <span class="doc-name">${d.n}</span>
      <span class="doc-st st-${d.st==='ok'?'ok':d.st==='flag'?'flag':'pending'}">${d.st==='ok'?'Approved':d.st==='flag'?'Flagged':'Pending'}</span>
      <button class="doc-btn db-ok" onclick="setDoc('${s.id}',${di},'ok')">Approve</button>
      <button class="doc-btn db-no" onclick="setDoc('${s.id}',${di},'flag')">Flag</button>
      <button class="doc-btn db-mv" onclick="rmDoc('${s.id}',${di})">Remove</button>
    </div>`;
  });
  h+=`</div>`;

  h+=`</div></div></div></div>`;
  return h;
}

function toggleSec(id){document.getElementById(id).classList.toggle('open');}
function togRule(sid,ri,el){
  const on=el.classList.toggle('on');
  el.innerHTML=on?'&#10003;':'';
  localStorage.setItem(sid+'-r-'+ri,on?'1':'0');
}
function addDoc(sid){
  const n=prompt('Document name:');
  if(!n)return;
  const docs=JSON.parse(localStorage.getItem('docs-'+sid)||'[]');
  docs.push({n:n,st:'pending'});
  localStorage.setItem('docs-'+sid,JSON.stringify(docs));
  buildFlow();buildSidebar();
}
function setDoc(sid,i,st){
  const docs=JSON.parse(localStorage.getItem('docs-'+sid)||'[]');
  if(docs[i]){docs[i].st=st;localStorage.setItem('docs-'+sid,JSON.stringify(docs));buildFlow();buildSidebar();}
}
function rmDoc(sid,i){
  if(!confirm('Remove?'))return;
  const docs=JSON.parse(localStorage.getItem('docs-'+sid)||'[]');
  docs.splice(i,1);localStorage.setItem('docs-'+sid,JSON.stringify(docs));buildFlow();buildSidebar();
}
function scrollToSection(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  const el=document.getElementById('sec-'+id);
  if(el){
    if(!el.classList.contains('open'))el.classList.add('open');
    el.scrollIntoView({behavior:'smooth',block:'start'});
  }
}
function viewOverview(){
  document.querySelectorAll('.funnel-section').forEach(s=>s.classList.remove('open'));
  document.getElementById('contentArea').scrollTo({top:0,behavior:'smooth'});
}
function exportReport(){
  let r='SLE FUNNEL REVIEW REPORT\n'+new Date().toLocaleDateString()+'\n\n';
  S.forEach(s=>{
    const docs=JSON.parse(localStorage.getItem('docs-'+s.id)||'[]');
    let rc=0;(s.rules||[]).forEach((x,i)=>{if(localStorage.getItem(s.id+'-r-'+i)==='1')rc++;});
    r+=`[${s.stage}] ${s.name}\n  Rules: ${rc}/${(s.rules||[]).length} | Docs: ${docs.length} (${docs.filter(d=>d.st==='ok').length} approved)\n\n`;
  });
  const b=new Blob([r],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sle-funnel-report.txt';a.click();
}

buildSidebar();
buildFlow();
</script>
