<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLE Daily Quiz | CSM Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0A0A0A;
    --gold: #E3C575;
    --bright-gold: #FDC33E;
    --dark-gold: #A78227;
    --navy: #1B2A45;
    --charcoal: #1a1a1a;
    --white: #FFFFFF;
    --red: #CE302A;
    --green: #2E7D32;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Geometric background */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(135deg, rgba(27,42,69,0.15) 25%, transparent 25%),
      linear-gradient(225deg, rgba(27,42,69,0.10) 25%, transparent 25%),
      linear-gradient(45deg, rgba(227,197,117,0.03) 25%, transparent 25%),
      linear-gradient(315deg, rgba(227,197,117,0.03) 25%, transparent 25%);
    background-size: 60px 60px;
    background-position: 0 0, 0 30px, 30px -30px, -30px 0;
    z-index: -1;
    pointer-events: none;
  }
  .container { max-width: 560px; margin: 0 auto; padding: 24px 20px 60px; }
  .logo { display: block; margin: 0 auto 8px; height: 72px; }
  .brand-label {
    text-align: center; font-size: 10px; letter-spacing: 3px;
    color: var(--dark-gold); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;
  }
  h1 {
    text-align: center; font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 2px;
  }
  h1 .gold-line {
    display: block; width: 60px; height: 3px; margin: 8px auto 0;
    background: linear-gradient(90deg, var(--dark-gold), var(--gold));
    border-radius: 2px;
  }
  .subtitle {
    text-align: center; font-size: 13px; color: #888; margin-top: 10px; margin-bottom: 28px;
    line-height: 1.5;
  }
  /* Name input */
  .name-section { margin-bottom: 28px; }
  .name-section label { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .name-input {
    width: 100%; padding: 14px 16px; border-radius: 10px;
    border: 1.5px solid #333; background: var(--charcoal); color: var(--white);
    font-family: 'Montserrat', sans-serif; font-size: 15px; outline: none;
    transition: border 0.2s;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: #555; }
  /* Question card */
  .question-card {
    background: var(--charcoal); border-radius: 14px; padding: 24px 20px;
    margin-bottom: 16px; border: 1px solid #2a2a2a;
    transition: border 0.3s;
  }
  .question-card.correct { border-color: var(--green); }
  .question-card.incorrect { border-color: var(--red); }
  .q-number { font-size: 11px; color: var(--dark-gold); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .q-text { font-size: 15px; font-weight: 700; color: var(--white); line-height: 1.5; margin-bottom: 16px; }
  .option {
    padding: 12px 16px; border-radius: 10px; cursor: pointer;
    background: #111; border: 1.5px solid #333; font-size: 13px;
    color: #ccc; transition: all 0.2s; margin-bottom: 8px; line-height: 1.4;
  }
  .option:hover { border-color: #555; }
  .option.selected { background: var(--navy); border-color: var(--gold); color: var(--white); }
  .option.correct-answer { background: #1b3a1b; border-color: var(--green); color: #8eff8e; }
  .option.wrong-answer { background: #3a1b1b; border-color: var(--red); color: #ff8e8e; }
  .option.disabled { pointer-events: none; }
  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 16px; border-radius: 12px; border: none;
    font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.3s; text-align: center;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--dark-gold), var(--gold));
    color: var(--black); box-shadow: 0 4px 20px rgba(227,197,117,0.25);
  }
  .btn-gold:hover { box-shadow: 0 6px 28px rgba(227,197,117,0.4); }
  .btn-gold:disabled { background: #333; color: #666; box-shadow: none; cursor: default; }
  .btn-outline {
    background: transparent; border: 1.5px solid rgba(227,197,117,0.4);
    color: var(--gold);
  }
  .btn-outline:hover { border-color: var(--gold); }
  /* Score card */
  .score-card {
    border-radius: 20px; padding: 36px 28px; text-align: center; margin-bottom: 28px;
    border: 2px solid;
  }
  .score-card.pass { background: linear-gradient(135deg, #0a2e0a, var(--charcoal)); border-color: var(--green); }
  .score-card.fail { background: linear-gradient(135deg, #2e0a0a, var(--charcoal)); border-color: var(--red); }
  .score-big { font-size: 64px; font-weight: 800; line-height: 1; }
  .score-big.pass { color: #4CAF50; }
  .score-big.fail { color: #ef5350; }
  .score-detail { font-size: 18px; font-weight: 600; margin-top: 12px; }
  .badge {
    display: inline-block; margin-top: 16px; padding: 8px 24px;
    border-radius: 30px; font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--white);
  }
  .badge.pass { background: var(--green); }
  .badge.fail { background: var(--red); }
  /* Progress */
  .progress-bar { height: 4px; background: #222; border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--dark-gold), var(--gold)); border-radius: 4px; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: #555; margin-bottom: 12px; }
  .footer {
    text-align: center; font-size: 10px; color: #444; letter-spacing: 1px;
    margin-top: 40px; padding-top: 20px; border-top: 1px solid #222;
  }
  /* Spinner */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .submit-status { text-align: center; font-size: 13px; color: #888; margin-top: 12px; }
  .submit-status.success { color: #4CAF50; }
  .submit-status.error { color: var(--red); }
  .hidden { display: none; }
</style>
</head>

      <label for="staffName">Your Name</label>
      <input type="text" id="staffName" class="name-input" placeholder="Enter your full name to begin..." autocomplete="off">
    </div>
    <button class="btn btn-gold" id="btnStart" disabled>Start Today's Quiz</button>
  </div>

  <!-- SCREEN: QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-text" id="progressText">0/5 answered</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionsContainer"></div>
    <button class="btn btn-gold" id="btnSubmit" disabled style="margin-top:12px">Submit Quiz</button>
  </div>

  <!-- SCREEN: RESULTS -->
  <div id="screen-results" class="hidden">
    <div id="scoreCard"></div>
    <div id="reviewContainer"></div>
    <div id="submitStatus" class="submit-status"></div>
    <button class="btn btn-outline" id="btnRetry" style="margin-top:20px">Try 5 New Questions</button>
  </div>

  <div class="footer">PROPERTY OF SERVICE LOOP ELECTRICAL INC<br>ServiceLoopElectrical.com</div>
</div>

<script>
// ===== ALL 35 QUESTIONS =====
const ALL_QUESTIONS = [
  { q: "SLE's guiding quote says that service to others is the highest form of what?", options: ["Profit", "Speed", "Distinction (standing out)", "Popularity"], correct: 2 },
  { q: "The Three Keys must be done in this order:", options: ["Great Service, then Strong Relationships, then Real Results", "Real Results, then Great Service, then Strong Relationships", "Strong Relationships, then Real Results, then Great Service", "Real Results, then Strong Relationships, then Great Service"], correct: 0 },
  { q: "Key 1 (Great Service) builds what feeling in the client?", options: ["Excitement", "Safety", "Urgency", "Loyalty"], correct: 1 },
  { q: "FORD stands for Family, Occupation, Recreation, and ___.", options: ["Delivery", "Data", "Direction", "Dreams"], correct: 3 },
  { q: "Which Pillar teaches that silence and delay say 'I don\u2019t care'?", options: ["You Cannot Not Communicate", "Progress = Happiness", "Influence Happens from the Same Side", "The Standard"], correct: 0 },
  { q: "What does 'Influence Happens from the Same Side' mean?", options: ["Push harder until the client agrees", "See their view first, then help them take the next step", "Always agree with the client", "Let the client lead every conversation"], correct: 1 },
  { q: "The Value Formula says to help clients get results that are:", options: ["Bigger and faster, with less effort", "Perfect, no matter how long it takes", "Cheap and fast, even if quality drops", "Delayed until all training is complete"], correct: 0 },
  { q: "A CSM\u2019s main job is to:", options: ["Handle billing and contracts", "Provide admin support", "Own the client\u2019s results and keep them moving forward", "Manage the sales pipeline"], correct: 2 },
  { q: "The CSMA\u2019s #1 rule is:", options: ["Run calls alone within 30 days", "Know every SLE process by heart", "Close upgrades as fast as possible", "You don\u2019t need to know everything \u2014 just don\u2019t disappear"], correct: 3 },
  { q: "A CSM\u2019s daily focus goes in this order:", options: ["Revenue, then retention, then referrals", "Relationship, then results, then Always Be Valuable", "Results, then value, then relationship", "Value, then results, then relationship"], correct: 1 },
  { q: "What is the first thing a CSM does each morning?", options: ["Review last month\u2019s revenue", "Plan next week\u2019s schedule", "Clear all client messages so nobody is waiting", "Write call scripts for the day"], correct: 2 },
  { q: "How many stages are in the SLE client journey?", options: ["5", "7", "9", "4"], correct: 1 },
  { q: "Service One Cert\u2122 is:", options: ["A free community membership", "A monthly marketing add-on", "A 3-month starter program", "A 9-month premium certification track"], correct: 3 },
  { q: "A \u2018Noob\u2019 client\u2019s biggest need is:", options: ["Hope, a plan, and a first win", "Advanced data and diagnostics", "Team training at scale", "Precision pricing systems"], correct: 0 },
  { q: "SLE\u2019s tone rule says to write for which client type?", options: ["The AllStar", "The Noob", "The Hustler", "The CEO"], correct: 2 },
  { q: "The Sprint Roadmap covers how many weeks?", options: ["12", "16", "30", "21"], correct: 3 },
  { q: "What should every roadmap call cover?", options: ["Where they are, what is next, and what done looks like", "Their revenue, their team size, and their ad spend", "Which classes are coming up next month", "How they compare to other clients"], correct: 0 },
  { q: "A client happiness score of 3.8 means you should:", options: ["Wait and see if it improves next call", "Follow up that same week", "Celebrate \u2014 that is a good score", "Move them to Green"], correct: 1 },
  { q: "High engagement + low happiness most likely means:", options: ["They are overwhelmed with too much work", "They have a scheduling conflict", "Something is wrong with how they are being served", "They need to be upgraded to a higher tier"], correct: 2 },
  { q: "Low engagement + high happiness most likely means:", options: ["Something is wrong with delivery", "They stopped believing in the program", "They need a new CSM", "They are overwhelmed \u2014 simplify their workload"], correct: 3 },
  { q: "Revenue Trend is what kind of signal?", options: ["The first thing to check", "The most important gauge", "A slow, trailing signal \u2014 never leads the conversation", "Only checked at renewal time"], correct: 2 },
  { q: "In the intensity system, RED means:", options: ["The client is a bad fit for SLE", "The client should be removed", "High need \u2014 steady them and get them going", "Time to push for an upgrade"], correct: 2 },
  { q: "A CSM should have no more than how many Red clients at once?", options: ["5\u20138", "20\u201325", "30+", "10\u201315"], correct: 3 },
  { q: "A Red client moves to Yellow when:", options: ["30 days pass automatically", "Their revenue goes up", "They ask to change status", "They get a real win and happiness hits 4.5+ for 2 calls in a row"], correct: 3 },
  { q: "Green intensity means:", options: ["Ignore the client until they reach out", "Check in less often, but with the same level of care", "They no longer need a CSM", "Only contact them about upgrades"], correct: 1 },
  { q: "The first step of the Huddle Sweep is:", options: ["Challenge", "Data", "Accountability", "Celebrate"], correct: 3 },
  { q: "Why must you celebrate wins BEFORE you challenge a client?", options: ["It saves time on the call", "Clients refuse to be challenged", "It is just a polite habit", "You earn the right to push by first making them feel safe"], correct: 3 },
  { q: "The last step of the Huddle Sweep is:", options: ["Accountability", "What\u2019s Next", "CSat \u2014 collect their star rating", "Celebrate"], correct: 2 },
  { q: "When something goes wrong with a client, Step 1 is:", options: ["Call the client right away", "Move them to Red", "Ask your Sr. CSM what to do", "Pick ONE signal \u2014 what exactly went wrong?"], correct: 3 },
  { q: "The 5 root cause categories are:", options: ["Confused, Stuck, Overwhelmed, Avoiding, Life Happened", "Price, Product, People, Process, Platform", "Fast, Medium, Slow, Stalled, Gone", "Revenue, Retention, Referrals, Results, Relationships"], correct: 0 },
  { q: "A client wants strategy but hasn\u2019t done the basics. You should say:", options: ["Here is the strategy \u2014 we'll do the basics later", "You are behind and need to catch up", "Let\u2019s finish the basics first so we build on real data, not guesses", "I need to check with my Sr. CSM before I can help"], correct: 2 },
  { q: "The \u20183/10 response\u2019 is the WRONG way to handle an upset client. Which IS a 3/10 response?", options: ["I\u2019m sorry \u2014 tell me how I let you down", "That\u2019s on us, let\u2019s fix it together", "I\u2019ll check with the team and get back to you", "What would make this a 5 for you?"], correct: 2 },
  { q: "Step 1 of a retention talk when a client wants to leave is:", options: ["Offer a discount", "Explain why the program works", "Listen without defending and take the blame", "Ask them to give it one more month"], correct: 2 },
  { q: "A retention talk is successful when:", options: ["The client re-signs on the spot", "The client calms down, sees you care, and has clear next steps", "You save the contract no matter what", "The client stops bringing up complaints"], correct: 1 },
  { q: "In their first 30 days, a new CSM handles how many clients?", options: ["25\u201335", "55\u201370", "10\u201315", "1\u20135"], correct: 2 },
];

// ===== NOTION CONFIG =====
const NOTION_DATA_SOURCE_ID = "65853b4d-7f8e-4bbb-92bc-567728f317b7";

// ===== STATE =====
let quizQuestions = [];
let answers = [];
let staffName = "";
let submitted = false;

// ===== DOM =====
const $ = id => document.getElementById(id);
const screenName = $("screen-name");
const screenQuiz = $("screen-quiz");
const screenResults = $("screen-results");
const nameInput = $("staffName");
const btnStart = $("btnStart");
const btnSubmit = $("btnSubmit");
const btnRetry = $("btnRetry");
const questionsContainer = $("questionsContainer");
const progressText = $("progressText");
const progressFill = $("progressFill");
const scoreCard = $("scoreCard");
const reviewContainer = $("reviewContainer");
const submitStatus = $("submitStatus");

// ===== HELPERS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick5() {
  return shuffle(ALL_QUESTIONS).slice(0, 5);
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

// ===== RENDER QUIZ =====
function renderQuiz() {
  questionsContainer.innerHTML = "";
  answers = new Array(5).fill(null);
  submitted = false;
  updateProgress();
  btnSubmit.disabled = true;

  quizQuestions.forEach((q, qi) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = "qcard-" + qi;
    card.innerHTML = `
      <div class="q-number">QUESTION ${qi + 1} OF 5</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${qi}">
        ${q.options.map((opt, oi) => `<div class="option" data-qi="${qi}" data-oi="${oi}">${opt}</div>`).join("")}
      </div>
    `;
    questionsContainer.appendChild(card);
  });

  document.querySelectorAll(".option").forEach(el => {
    el.addEventListener("click", function () {
      if (submitted) return;
      const qi = parseInt(this.dataset.qi);
      const oi = parseInt(this.dataset.oi);
      answers[qi] = oi;
      // Update selected state
      document.querySelectorAll(`#opts-${qi} .option`).forEach(o => o.classList.remove("selected"));
      this.classList.add("selected");
      updateProgress();
    });
  });
}

function updateProgress() {
  const count = answers.filter(a => a !== null).length;
  progressText.textContent = `${count}/5 answered`;
  progressFill.style.width = `${(count / 5) * 100}%`;
  btnSubmit.disabled = count < 5;
}

// ===== GRADE & SHOW RESULTS =====
function gradeQuiz() {
  submitted = true;
  let score = 0;
  const details = [];

  quizQuestions.forEach((q, qi) => {
    const isCorrect = answers[qi] === q.correct;
    if (isCorrect) score++;
    details.push(`Q${qi + 1}: ${isCorrect ? "\u2713" : "\u2717"} (answered ${String.fromCharCode(65 + answers[qi])}, correct ${String.fromCharCode(65 + q.correct)})`);

    // Style the card
    const card = $("qcard-" + qi);
    card.className = "question-card " + (isCorrect ? "correct" : "incorrect");

    // Style options
    document.querySelectorAll(`#opts-${qi} .option`).forEach((o, oi) => {
      o.classList.add("disabled");
      if (oi === q.correct) o.classList.add("correct-answer");
      if (oi === answers[qi] && !isCorrect) o.classList.add("wrong-answer");
    });
  });

  const pct = Math.round((score / 5) * 100);
  const passed = pct >= 80;

  scoreCard.innerHTML = `
    <div class="score-card ${passed ? "pass" : "fail"}">
      <div class="score-big ${passed ? "pass" : "fail"}">${pct}%</div>
      <div class="score-detail">${score}/5 correct</div>
      <div class="badge ${passed ? "pass" : "fail"}">${passed ? "GREAT WORK" : "REVIEW & RETRY"}</div>
    </div>
  `;

  // Move questions into review
  reviewContainer.innerHTML = questionsContainer.innerHTML;
  questionsContainer.innerHTML = "";

  // Show results screen
  screenQuiz.classList.add("hidden");
  screenResults.classList.remove("hidden");

  // Submit to Notion
  submitToNotion(staffName, score, 5, details.join(" | "));
}

// ===== NOTION SUBMISSION via Anthropic API + MCP =====
async function submitToNotion(name, score, total, questionsText) {
  submitStatus.innerHTML = '<span class="spinner"></span>Saving to Notion...';
  submitStatus.className = "submit-status";

  const today = todayISO();
  const passed = (score / total) >= 0.8;

  const prompt = `Create a new page in the Notion data source with ID "${NOTION_DATA_SOURCE_ID}". Use these exact property values:
- Name (title): "${name}"
- date:Date:start: "${today}"
- date:Date:is_datetime: 0
- Score: ${score}
- Total: ${total}
- Passed: "${passed ? "__YES__" : "__NO__"}"
- Questions: "${questionsText.replace(/"/g, '\\"')}"

Use the notion-create-pages tool with parent data_source_id "${NOTION_DATA_SOURCE_ID}". Do NOT include any content, only properties.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion-mcp" }]
      })
    });

    const data = await response.json();

    // Check for tool use success
    const hasToolUse = data.content && data.content.some(b => b.type === "mcp_tool_use" || b.type === "mcp_tool_result");
    const hasError = data.content && data.content.some(b => b.type === "mcp_tool_result" && b.is_error);

    if (hasToolUse && !hasError) {
      submitStatus.innerHTML = "\u2713 Saved to Notion successfully!";
      submitStatus.className = "submit-status success";
    } else {
      submitStatus.innerHTML = "\u26a0 Quiz completed. Notion sync may be delayed.";
      submitStatus.className = "submit-status";
    }
  } catch (err) {
    console.error("Notion submit error:", err);
    submitStatus.innerHTML = "\u26a0 Quiz completed. Could not reach Notion \u2014 please screenshot your score.";
    submitStatus.className = "submit-status error";
  }
}

// ===== EVENT LISTENERS =====
nameInput.addEventListener("input", () => {
  btnStart.disabled = nameInput.value.trim().length < 2;
});

btnStart.addEventListener("click", () => {
  staffName = nameInput.value.trim();
  if (!staffName) return;
  quizQuestions = pick5();
  screenName.classList.add("hidden");
  screenQuiz.classList.remove("hidden");
  renderQuiz();
});

nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !btnStart.disabled) btnStart.click();
});

btnSubmit.addEventListener("click", () => {
  if (answers.filter(a => a !== null).length < 5) return;
  gradeQuiz();
});

btnRetry.addEventListener("click", () => {
  quizQuestions = pick5();
  screenResults.classList.add("hidden");
  screenQuiz.classList.remove("hidden");
  submitStatus.innerHTML = "";
  scoreCard.innerHTML = "";
  reviewContainer.innerHTML = "";
  renderQuiz();
});
</script>
</body>
